# monoi.cn 后端 API 反向代理
# 放到 /etc/nginx/sites-available/monoi 然后 ln -s 到 sites-enabled/
#
# 架构:
#   monoi.cn / www.monoi.cn  → CDN → OSS (前端静态, 不经过本机)
#   api.monoi.cn             → 本机 nginx → main.py:18765 (后端 API + WebSocket)
#
# 前端构建时设 VITE_DIRECT_API_URL=https://api.monoi.cn
#
# HTTPS: 先用这个 80 端口配置跑通, 再 `certbot --nginx -d api.monoi.cn`
#        certbot 会自动加 443 server 块 + 80→443 跳转, 不用手改.

# WebSocket 升级所需的 map (放 http 块顶层; 若 /etc/nginx/nginx.conf 已有可删掉这段)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.monoi.cn;

    # 上传大文件 (音频/视频/数字人素材) — 放开限制
    client_max_body_size 500m;

    # 后端响应慢的接口 (TTS/数字人/转录) 给足超时
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # WebSocket: /ws/asr (闪说实时转录) 等 — main.py:18765 内部再转 voice-server:9001
    location /ws/ {
        proxy_pass http://127.0.0.1:18765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # 全部 /api/* → main.py
    location /api/ {
        proxy_pass http://127.0.0.1:18765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流式 (/api/chat stream) 需要关闭缓冲
        proxy_buffering off;
    }

    # 健康检查 / 根路径 (可选)
    location / {
        proxy_pass http://127.0.0.1:18765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
