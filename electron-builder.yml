# electron-builder 配置 — 打 Windows .exe (NSIS installer)
#
# 不签名: 用户首次启动会有 Windows SmartScreen 警告, 提示"未知发布者".
# 教程: 用户点 "更多信息" → "仍要运行". 内置教程图引导.
# 签名要 ¥1500/年 (DigiCert 等), 等用户量上来再说.

appId: cn.monoi.desktop
productName: monoi
copyright: Copyright © 2026 monoi.cn

# 主进程入口 (编译后的 JS)
directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*       # 编译后的 main.js + preload.js
  - package.json

# Windows 配置
win:
  target:
    - target: nsis            # 安装程序 (推荐, 用户双击装)
      arch: [x64]
  # icon: build/icon.ico       # TODO: 加图标 (256x256 ico). 没图标用 Electron 默认
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false              # 不一键装, 让用户选路径
  perMachine: false            # 装到当前用户 (不要管理员权限)
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: monoi
  uninstallDisplayName: monoi 视频创作

# macOS (留接口, 当前没 Apple 账号不打包)
mac:
  target: [dmg]
  category: public.app-category.video

# 发布走 OSS (generic provider) — electron-updater 启动时去这个 URL 查 latest.yml.
# GitHub Releases 在国内慢 + 用户看 github.com 不专业, 走 monoi 自己的 OSS 域名.
#
# 部署 workflow (每次发新版):
# 1. 改 package.json version (0.1.0 → 0.2.0)
# 2. npm run pack:win → release/monoi-Setup-0.2.0.exe + release/latest.yml
# 3. 把这两个文件上传到 OSS desktop_release/ 目录 (ACL: 公共读)
# 4. 改 windows-server/desktop_release.json version+url, 重启 main.py
# 5. 已装的桌面端启动 5 秒后自动查 → 后台下载新版
#
# ⚠️ 改下面 url 成你真实的 OSS 域名再 pack:win, 不然 latest.yml 写的是占位地址.
publish:
  provider: generic
  url: https://CHANGE-ME-bucket.oss-cn-hangzhou.aliyuncs.com/desktop_release
  channel: latest
