# electron-builder 配置 — 打 Windows .exe (NSIS installer)
#
# 不签名: 用户首次启动会有 Windows SmartScreen 警告, 提示"未知发布者".
# 教程: 用户点 "更多信息" → "仍要运行". 内置教程图引导.
# 签名要 ¥1500/年 (DigiCert 等), 等用户量上来再说.

appId: cn.monoi.desktop
productName: monoi
copyright: Copyright © 2026 monoi.cn

# 主进程入口 (编译后的 JS)
directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*       # 编译后的 main.js + preload.js
  - package.json

# Windows 配置
win:
  target:
    - target: nsis            # 安装程序 (推荐, 用户双击装)
      arch: [x64]
  icon: build/icon.ico         # 多尺寸 16/32/48/64/128/256 合一. 任务栏 / 桌面快捷 / 装包 / 开始菜单都用这个
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  installerIcon: build/icon.ico      # 装包自己的图标 (用户在下载文件夹看到的)
  uninstallerIcon: build/icon.ico    # 卸载程序图标
  installerHeaderIcon: build/icon.ico # 装包窗口左上小图标
  oneClick: false              # 不一键装, 让用户选路径
  perMachine: false            # 装到当前用户 (不要管理员权限)
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: monoi
  uninstallDisplayName: monoi 视频创作

# macOS (留接口, 当前没 Apple 账号不打包)
mac:
  target: [dmg]
  category: public.app-category.video

# 发布走 monoi 后端代理 — 桌面端启动后向 {url}/latest.yml + {url}/{file} 拉,
# 后端 /api/desktop/update/* 拿到请求会签名 OSS URL 然后 302 跳过去, 用户最终
# 还是从 OSS 下, 但不需要 OSS bucket 公共读 ACL (RAM 子账号没权设).
#
# 好处:
# - 不依赖 OSS 权限设置 (用户后端凭据签 URL 就行)
# - URL 在 monoi 域名下永久稳定
# - 后期可以加下载量统计 / 限流 / 防黑产爬
#
# 部署 workflow (每次发新版):
# 1. 改 package.json version (0.1.0 → 0.2.0)
# 2. npm run pack:win → release/monoi-Setup-0.2.0.exe + latest.yml + .blockmap
# 3. 跑 python upload_desktop_release.py D:\monoi-electron\release\monoi-Setup-0.2.0.exe
# 4. 改 D:\monoi-server\desktop_release.json (version + exe_url), 重启 main.py
# 5. 已装桌面端 5s 自动查 → 走代理下载新版
publish:
  provider: generic
  url: https://api.monoi.cn/api/desktop/update
  channel: latest
